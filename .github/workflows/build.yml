name: build-webui
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Clone browser-use/web-ui
        run: git clone --depth 1 https://github.com/browser-use/web-ui.git src
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./src
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/byfly-browser-ai:latest
          provenance: false
